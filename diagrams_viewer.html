<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>VocalAI - 시스템 아키텍처 및 프로세스 도식화</title>
  <style>
    body {
      background: #090d16;
      color: #f8fafc;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      margin: 0;
      padding: 40px 20px;
      text-align: center;
    }
    h1 { font-size: 32px; font-weight: 700; color: #f8fafc; letter-spacing: -0.5px; margin-bottom: 8px; }
    p { color: #94a3b8; font-size: 15px; margin-bottom: 36px; }
    .nav-tabs { display: flex; justify-content: center; gap: 12px; margin-bottom: 28px; }
    .tab-btn {
      padding: 11px 24px; font-size: 14.5px; font-weight: 600; border-radius: 8px; border: 1px solid #334155; background: #1e293b; color: #cbd5e1; cursor: pointer; transition: all 0.2s;
    }
    .tab-btn.active { background: #0f172a; border-color: #0d9488; color: #2dd4bf; box-shadow: 0 0 15px rgba(13, 148, 136, 0.2); }
    .diagram-container { max-width: 1240px; margin: 0 auto; background: #0f172a; border: 1px solid #334155; border-radius: 12px; padding: 24px; box-shadow: 0 15px 40px rgba(0,0,0,0.5); }
    object { width: 100%; height: auto; border-radius: 8px; display: block; }
  </style>
</head>
<body>
  <h1>시스템 아키텍처 및 핵심 프로세스 파이프라인</h1>
  <p>사용자 성별 맞춤 큐레이션 및 원곡·연습곡 비교 평가 도식화</p>

  <div class="nav-tabs">
    <button class="tab-btn active" onclick="showTab('rec', this)">1. 맞춤 곡 추천 (사용자 맞춤 알고리즘)</button>
    <button class="tab-btn" onclick="showTab('ana', this)">2. 곡 분석 (원곡 분석 &amp; 연습곡 분석)</button>
  </div>

  <div id="rec-diagram" class="diagram-container">
    <object data="song_recommendation_process.svg" type="image/svg+xml"></object>
  </div>

  <div id="ana-diagram" class="diagram-container" style="display: none;">
    <object data="song_analysis_process.svg" type="image/svg+xml"></object>
  </div>

  <script>
    function showTab(tab, btn) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('rec-diagram').style.display = tab === 'rec' ? 'block' : 'none';
      document.getElementById('ana-diagram').style.display = tab === 'ana' ? 'block' : 'none';
    }
  </script>
</body>
</html>
